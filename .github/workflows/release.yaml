name: 'Publish Release'

on:
  push:
    tags:
      - 'v*' # v1.0.0 などのタグがプッシュされたときに起動

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest' # Windows用ビルド環境
            args: ''
            update-platforms: 'windows-x86_64'
          - platform: 'macos-latest'   # Mac用ビルド環境（必要に応じて）
            args: '--target universal-apple-darwin'
            update-platforms: 'darwin-x86_64,darwin-aarch64'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # フロントエンドのセットアップ (Node.jsの例 / Bunやpnpmの場合は適宜変更)
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*

      # Rustのセットアップ
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # Rustのビルドキャッシュ（高速化用）
      - name: Rust cache
        uses: swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: './src-tauri -> target'

      # フロントエンドの依存関係インストール
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install

      # .env を GitHub Secrets から生成（cargo build 時に env!() マクロで埋め込まれる）
      - name: Create .env file from secrets
        run: |
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" > .env
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env

      - name: Sync app version from tag
        run: bun run scripts/sync-release-version.mjs
        env:
          RELEASE_VERSION: ${{ github.ref_name }}

      # Tauri公式のビルド・リリースActionを実行
      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@fce9c6108b31ea247710505d3aaaa893ee6768d4 # v0
        id: tauri-build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'App ${{ github.ref_name }}'
          releaseBody: 'See the assets to download this version.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Verify updater signatures
        shell: bash
        run: |
          set -euo pipefail
          sig_count=$(find src-tauri/target -type f \( -name "*.sig" -o -name "*.minisig" \) | wc -l | tr -d ' ')
          if [ "$sig_count" = "0" ]; then
            echo "No updater signatures were generated."
            echo "TAURI_SIGNING_PRIVATE_KEY and bundle.createUpdaterArtifacts are required."
            exit 1
          fi
          find src-tauri/target -type f \( -name "*.sig" -o -name "*.minisig" \) -print

      # この runner で生成された署名済み updater artifact から manifest 断片を作る
      - name: Generate update manifest part
        shell: bash
        run: bun run scripts/generate-update-json.mjs partial
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
          UPDATE_PLATFORM_KEYS: ${{ matrix.update-platforms }}

      - name: Upload update manifest part
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: update-manifest-${{ matrix.platform }}
          path: update-manifest-part.json

  publish:
    needs: [publish-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2
        with:
          bun-version: latest
      - name: Download update manifest parts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: update-manifest-*
          path: update-manifests
      - name: Generate latest.json
        run: bun run scripts/generate-update-json.mjs merge
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
      - name: Upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" latest.json --clobber
      - name: Publish Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" --draft=false
